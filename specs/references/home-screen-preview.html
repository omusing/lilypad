<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lilypad — Home Screen Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       DESIGN TOKENS — tweak these to adjust the whole screen
       ========================================================= */
    :root {
      /* Core palette */
      --color-bg:            #E2EEE7;   /* screen background — was #F7FBF8 */
      --color-card:          #F4FAF6;   /* widget surface — was #FFFFFF */
      --color-text:          #1C2523;
      --color-text-secondary:#6B7C73;
      --color-border:        #D0DFDA;

      /* Action colors */
      --color-pain:          #9E5252;   /* Log Pain button — muted brick rose (pain = warm red) */
      --color-pain-light:    #F5EDED;   /* pain dot / accent */
      --color-med:           #2E7D5E;   /* Log Medication button — forest green (healing) */
      --color-med-light:     #E6F3ED;   /* med dot / accent */
      --color-mint:          #8BCFAA;   /* sparkline line */
      --color-brand:         #2E7D5E;   /* UI chrome: active tab, focus states */

      /* Typography */
      --font-serif:          'Fraunces', Georgia, serif;
      --font-sans:           'Instrument Sans', system-ui, sans-serif;

      /* Spacing */
      --space-unit:          8px;
      --space-xs:            4px;
      --space-sm:            8px;
      --space-md:            16px;
      --space-lg:            24px;
      --space-xl:            32px;

      /* Radii */
      --radius-card:         20px;
      --radius-button:       28px;
      --radius-chip:         12px;
      --radius-dot:          50%;

      /* Shadows */
      --shadow-card:         0 4px 16px rgba(26,122,78,0.13), 0 1px 4px rgba(26,122,78,0.08);
      --shadow-phone:        0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
    }

    /* =========================================================
       PAGE SHELL
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: #D6E8DC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* =========================================================
       PHONE FRAME
       ========================================================= */
    .phone {
      width: 393px;
      height: 852px;
      background: var(--color-bg);
      border-radius: 54px;
      box-shadow: var(--shadow-phone);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(0,0,0,0.08);
    }

    /* Dynamic island */
    .phone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* =========================================================
       STATUS BAR
       ========================================================= */
    .status-bar {
      height: 59px;
      padding: 18px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status-bar .time {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.2px;
    }

    .status-bar .icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-bar .icons svg {
      fill: var(--color-text);
    }

    /* =========================================================
       SCROLL CONTENT
       ========================================================= */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 24px;
      scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* =========================================================
       HEADER ROW
       ========================================================= */
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-card);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
      margin-top: 6px;
    }

    /* =========================================================
       GREETING
       ========================================================= */
    .greeting {
      margin-bottom: var(--space-lg);
    }

    .greeting-name {
      font-family: var(--font-serif);
      font-size: clamp(24px, 8vw, 34px);   /* scales down for long names */
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.5px;
      line-height: 1.15;
      word-break: break-word;
    }

    .greeting-date {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    /* =========================================================
       PRIMARY ACTIONS
       ========================================================= */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }

    .action-btn {
      border: none;
      border-radius: var(--radius-button);
      padding: 22px 16px 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 80ms ease, filter 80ms ease;
    }

    .action-btn:active {
      transform: scale(0.97);
      filter: brightness(0.93);
    }

    .action-btn.pain {
      background: var(--color-pain);
    }

    .action-btn.med {
      background: var(--color-med);
    }

    .action-btn .btn-icon {
      width: 32px;
      height: 32px;
      opacity: 0.92;
    }

    .action-btn .btn-label {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: -0.1px;
    }

    /* =========================================================
       CARDS
       ========================================================= */
    .card {
      background: var(--color-card);
      border-radius: var(--radius-card);
      padding: var(--space-md) var(--space-md);
      box-shadow: var(--shadow-card);
      margin-bottom: var(--space-md);
    }

    .card-label {
      font-family: var(--font-sans);
      font-size: 12px;   /* was 11px */
      font-weight: 600;
      color: var(--color-text-secondary);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* =========================================================
       RECENT ACTIVITY
       ========================================================= */
    .activity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .activity-row + .activity-row {
      border-top: 1px solid var(--color-border);
    }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-dot);
      flex-shrink: 0;
    }

    .activity-dot.pain  { background: var(--color-pain); }
    .activity-dot.med   { background: var(--color-med); }

    .activity-text {
      font-size: 16px;   /* was 14px */
      color: var(--color-text);
      font-weight: 400;
    }

    .activity-text strong {
      font-weight: 600;
    }

    .activity-time {
      margin-left: auto;
      font-size: 15px;   /* was 13px */
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* =========================================================
       SPARKLINE
       ========================================================= */
    .sparkline-card {
      /* extra bottom padding for the axis labels */
      padding-bottom: 12px;
    }

    .sparkline-svg {
      width: 100%;
      height: 80px;
      display: block;
    }

    /* =========================================================
       TAB BAR
       ========================================================= */
    .tab-bar {
      height: 83px;
      background: var(--color-card);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: flex-start;
      padding-top: 10px;
      padding-bottom: 28px; /* home indicator space */
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }

    .tab svg {
      width: 24px;
      height: 24px;
    }

    .tab-label {
      font-family: var(--font-sans);
      font-size: 11px;   /* was 10px */
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .tab.active .tab-label {
      color: var(--color-brand);
      font-weight: 600;
    }

    .tab.active svg path,
    .tab.active svg circle,
    .tab.active svg rect {
      fill: var(--color-pain);
    }

    /* Home indicator bar */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--color-text);
      border-radius: 3px;
      opacity: 0.18;
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.5a6 6 0 0 1 4.24 1.76l-1.42 1.41A4 4 0 0 0 8 8a4 4 0 0 0-2.82 1.17L3.76 7.76A6 6 0 0 1 8 6zm0-4a10 10 0 0 1 7.07 2.93L13.65 6.35A8 8 0 0 0 8 4a8 8 0 0 0-5.65 2.35L.93 4.93A10 10 0 0 1 8 2z" fill-rule="evenodd"/></svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="currentColor"/><path d="M22.5 4.5v3a1.5 1.5 0 0 0 0-3z"/></svg>
    </div>
  </div>

  <!-- Scrollable screen -->
  <div class="screen-content">

    <!-- Header row with settings -->
    <div class="header-row">
      <div class="greeting">
        <div class="greeting-name">Hello, Sarah</div>
        <div class="greeting-date">Wednesday, April 15</div>
      </div>
      <button class="settings-btn" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7C73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <!-- Primary actions -->
    <div class="actions">
      <button class="action-btn pain">
        <!-- Wave / pain icon -->
        <svg class="btn-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 18c2-4 4-6 6-6s4 6 6 6 4-6 6-6 4 2 6 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="10" r="3" stroke="white" stroke-width="2"/>
        </svg>
        <span class="btn-label">Log Pain</span>
      </button>
      <button class="action-btn med">
        <!-- Pill icon -->
        <svg class="btn-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="13" width="20" height="6" rx="3" stroke="white" stroke-width="2"/>
          <line x1="16" y1="13" x2="16" y2="19" stroke="white" stroke-width="2"/>
          <circle cx="9" cy="16" r="1.5" fill="white"/>
          <circle cx="23" cy="16" r="1.5" fill="white"/>
        </svg>
        <span class="btn-label">Log Medication</span>
      </button>
    </div>

    <!-- Recent activity -->
    <div class="card">
      <div class="card-label">Recent Activity</div>
      <div class="activity-row">
        <div class="activity-dot pain"></div>
        <span class="activity-text">Last pain log</span>
        <span class="activity-time">3 hours ago</span>
      </div>
      <div class="activity-row">
        <div class="activity-dot med"></div>
        <span class="activity-text"><strong>Ibuprofen</strong> logged</span>
        <span class="activity-time">1 hour ago</span>
      </div>
    </div>

    <!-- 14-day sparkline -->
    <div class="card sparkline-card">
      <div class="card-label">14-day pain trend</div>
      <svg class="sparkline-svg" viewBox="0 0 320 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Grid lines (very subtle) -->
        <line x1="0" y1="20" x2="320" y2="20" stroke="#E4EDE7" stroke-width="1"/>
        <line x1="0" y1="40" x2="320" y2="40" stroke="#E4EDE7" stroke-width="1"/>
        <line x1="0" y1="60" x2="320" y2="60" stroke="#E4EDE7" stroke-width="1"/>

        <!-- Y-axis labels -->
        <text x="316" y="23" font-size="8" fill="#6B7C73" text-anchor="end" font-family="'Instrument Sans', sans-serif">8</text>
        <text x="316" y="43" font-size="8" fill="#6B7C73" text-anchor="end" font-family="'Instrument Sans', sans-serif">5</text>
        <text x="316" y="63" font-size="8" fill="#6B7C73" text-anchor="end" font-family="'Instrument Sans', sans-serif">2</text>

        <!--
          Data: 14 days. pain 0-10 mapped to y (10→4, 0→76).
          Scale: y = 76 - value * 7.2
          Segment 1: days 1-5  (x: 0, 23, 46, 69, 92)
          Gap: days 6-7 (no data)
          Segment 2: days 8-12 (x: 161, 184, 207, 230, 253)
          Gap: day 13 (no data)
          Segment 3: day 14   (x: 299)
        -->

        <!-- Segment 1 fill -->
        <path d="M0,40 L0,40 L23,18 L46,47 L69,25 L92,54 L92,76 L0,76 Z"
              fill="url(#painGradient)" opacity="0.15"/>
        <!-- Segment 2 fill -->
        <path d="M161,32 L184,54 L207,18 L230,40 L253,25 L253,76 L161,76 Z"
              fill="url(#painGradient)" opacity="0.15"/>

        <defs>
          <linearGradient id="painGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9E5252"/>
            <stop offset="100%" stop-color="#9E5252" stop-opacity="0"/>
          </linearGradient>
        </defs>

        <!-- Segment 1: days 1-5 -->
        <polyline
          points="0,40 23,18 46,47 69,25 92,54"
          fill="none" stroke="#9E5252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Segment 2: days 8-12 -->
        <polyline
          points="161,32 184,54 207,18 230,40 253,25"
          fill="none" stroke="#9E5252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Segment 3: day 14 (single point shown as dot) -->
        <circle cx="299" cy="36" r="3" fill="#9E5252"/>

        <!-- Data point dots — segment 1 -->
        <circle cx="0"  cy="40" r="3" fill="#9E5252"/>
        <circle cx="23" cy="18" r="3" fill="#9E5252"/>
        <circle cx="46" cy="47" r="3" fill="#9E5252"/>
        <circle cx="69" cy="25" r="3" fill="#9E5252"/>
        <circle cx="92" cy="54" r="3" fill="#9E5252"/>

        <!-- Gap indicators -->
        <circle cx="115" cy="68" r="2" fill="#C8D8D0"/>
        <circle cx="138" cy="68" r="2" fill="#C8D8D0"/>

        <!-- Data point dots — segment 2 -->
        <circle cx="161" cy="32" r="3" fill="#9E5252"/>
        <circle cx="184" cy="54" r="3" fill="#9E5252"/>
        <circle cx="207" cy="18" r="3" fill="#9E5252"/>
        <circle cx="230" cy="40" r="3" fill="#9E5252"/>
        <circle cx="253" cy="25" r="3" fill="#9E5252"/>

        <!-- Gap indicator -->
        <circle cx="276" cy="68" r="2" fill="#C8D8D0"/>

        <!-- Pain level tooltip on latest point -->
        <rect x="281" y="20" width="30" height="16" rx="4" fill="#9E5252"/>
        <text x="296" y="32" font-size="9" fill="white" text-anchor="middle" font-weight="600" font-family="'Instrument Sans', sans-serif">6</text>
      </svg>
    </div>

  </div><!-- /screen-content -->

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" fill="#2E7D5E" stroke="#2E7D5E" stroke-width="1.5"/>
        <path d="M9 21V12h6v9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-label" style="color:var(--color-brand)">Home</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6B7C73" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8" y2="14" stroke-width="2"/>
        <line x1="12" y1="14" x2="12" y2="14" stroke-width="2"/>
        <line x1="16" y1="14" x2="16" y2="14" stroke-width="2"/>
      </svg>
      <span class="tab-label">History</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6B7C73" stroke-width="1.8" stroke-linecap="round">
        <rect x="6" y="9" width="12" height="8" rx="2"/>
        <path d="M9 9V7a3 3 0 0 1 6 0v2"/>
        <circle cx="12" cy="13" r="1" fill="#6B7C73"/>
      </svg>
      <span class="tab-label">Medications</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6B7C73" stroke-width="1.8" stroke-linecap="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span class="tab-label">Report</span>
    </div>
  </div>

  <div class="home-indicator"></div>

</div><!-- /phone -->

</body>
</html>
